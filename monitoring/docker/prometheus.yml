global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'catalog-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['catalog.api:80']

  - job_name: 'basket-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['basket.api:80']

  - job_name: 'ordering-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['ordering.api:80']

  - job_name: 'ocelot-api-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['ocelot.apigateway:80']

